<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>進化版FPSゲーム（HP・攻撃付き）</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
  canvas { display:block; }
  #ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:sans-serif;
  }
</style>
</head>
<body>
<div id="ui">HP: <span id="hp">100</span> | スコア: <span id="score">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, y: canvas.height/2, angle:0, speed:4, hp:100 };
let bullets = [];
let enemyBullets = [];
let enemies = [];
let score = 0;

function spawnEnemy(){
  enemies.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size:20,
    speed:1.2,
    shootTimer:0
  });
}
for(let i=0;i<3;i++) spawnEnemy();

let keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener("mousemove", e=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  player.angle = Math.atan2(my - player.y, mx - player.x);
});

canvas.addEventListener("click", ()=>{
  bullets.push({
    x: player.x,
    y: player.y,
    dx: Math.cos(player.angle)*8,
    dy: Math.sin(player.angle)*8
  });
});

function update(){
  if(player.hp <= 0) return;

  if(keys["w"]) {
    player.x += Math.cos(player.angle)*player.speed;
    player.y += Math.sin(player.angle)*player.speed;
  }
  if(keys["s"]) {
    player.x -= Math.cos(player.angle)*player.speed;
    player.y -= Math.sin(player.angle)*player.speed;
  }
  if(keys["a"]) {
    player.x += Math.cos(player.angle - Math.PI/2)*player.speed;
    player.y += Math.sin(player.angle - Math.PI/2)*player.speed;
  }
  if(keys["d"]) {
    player.x += Math.cos(player.angle + Math.PI/2)*player.speed;
    player.y += Math.sin(player.angle + Math.PI/2)*player.speed;
  }

  bullets.forEach(b=>{ b.x += b.dx; b.y += b.dy; });
  enemyBullets.forEach(b=>{ b.x += b.dx; b.y += b.dy; });

  enemies.forEach(e=>{
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    e.x += dx/dist * e.speed;
    e.y += dy/dist * e.speed;

    e.shootTimer++;
    if(e.shootTimer > 60){
      e.shootTimer = 0;
      enemyBullets.push({
        x: e.x,
        y: e.y,
        dx: dx/dist*5,
        dy: dy/dist*5
      });
    }
  });

  // 弾ヒット
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      let dx = b.x - e.x;
      let dy = b.y - e.y;
      if(Math.sqrt(dx*dx+dy*dy) < e.size){
        enemies.splice(ei,1);
        bullets.splice(bi,1);
        score++;
        document.getElementById("score").textContent = score;
        spawnEnemy();
      }
    });
  });

  // 敵弾ヒット
  enemyBullets.forEach((b,bi)=>{
    let dx = b.x - player.x;
    let dy = b.y - player.y;
    if(Math.sqrt(dx*dx+dy*dy) < 15){
      enemyBullets.splice(bi,1);
      player.hp--;
      document.getElementById("hp").textContent = player.hp;
    }
  });
}

function drawHuman(x,y,angle,color){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);

  // 頭
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(0,-15,8,0,Math.PI*2);
  ctx.fill();

  // 体
  ctx.fillRect(-3,-10,6,20);

  // 銃
  ctx.fillStyle = "white";
  ctx.fillRect(5,-2,12,4);

  ctx.restore();
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawHuman(player.x, player.y, player.angle, "cyan");

  enemies.forEach(e=>{
    const angle = Math.atan2(player.y-e.y, player.x-e.x);
    drawHuman(e.x, e.y, angle, "red");
  });

  ctx.fillStyle="yellow";
  bullets.forEach(b=> ctx.fillRect(b.x-2,b.y-2,4,4));

  ctx.fillStyle="orange";
  enemyBullets.forEach(b=> ctx.fillRect(b.x-2,b.y-2,4,4));

  if(player.hp <= 0){
    ctx.fillStyle="white";
    ctx.font="50px sans-serif";
    ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
